name: Deploy Production

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    environment: Guangzhou
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      TCR_USERNAME: ${{ secrets.TCR_USERNAME }}
      TCR_PASSWORD: ${{ secrets.TCR_PASSWORD }}
      TCR_REGISTRY: ${{ secrets.TCR_REGISTRY }}
      TCR_NAMESPACE: ${{ secrets.TCR_NAMESPACE }}
      TCR_REPOSITORY: ${{ secrets.TCR_REPOSITORY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            admin:
              - 'kinit-admin/**'
            api:
              - 'kinit-api/**'
              - 'docker_env/kinit-api/**'

      - name: Set up Docker Buildx
        if: steps.changes.outputs.api == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Set up Node
        if: steps.changes.outputs.admin == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Compute names
        if: steps.changes.outputs.api == 'true'
        id: meta
        run: |
          REPO_NAME="${TCR_REPOSITORY:-pe-test}"
          echo "api_image=${TCR_NAMESPACE}/${REPO_NAME}-kinit-api" >> $GITHUB_OUTPUT
          echo "sha_short=${GITHUB_SHA::12}" >> $GITHUB_OUTPUT

      - name: Login to Tencent TCR
        if: steps.changes.outputs.api == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.TCR_REGISTRY }}
          username: ${{ env.TCR_USERNAME }}
          password: ${{ env.TCR_PASSWORD }}

      - name: Build & Push kinit-api image
        if: steps.changes.outputs.api == 'true'
        uses: docker/build-push-action@v6
        env:
          BUILDKIT_PROGRESS: plain
        with:
          context: ./kinit-api
          file: docker_env/kinit-api/Dockerfile
          push: true
          pull: true
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.TCR_REGISTRY }}/${{ steps.meta.outputs.api_image }}:latest
            ${{ env.TCR_REGISTRY }}/${{ steps.meta.outputs.api_image }}:${{ steps.meta.outputs.sha_short }}

      - name: Build kinit-admin static files
        if: steps.changes.outputs.admin == 'true'
        working-directory: kinit-admin
        run: |
          pwd
          ls -la
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
          npm run build:pro

      - name: Upload kinit-admin static files
        if: steps.changes.outputs.admin == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ env.DEPLOY_SSH_KEY }}
          port: ${{ env.DEPLOY_PORT || '22' }}
          source: "kinit-admin/dist-pro/**"
          target: "${{ env.DEPLOY_PATH }}/kinit-admin-dist"
          strip_components: 2
          overwrite: true

      - name: Deploy api/mysql by docker compose
        if: steps.changes.outputs.api == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ env.DEPLOY_SSH_KEY }}
          port: ${{ env.DEPLOY_PORT || '22' }}
          script: |
            set -e
            cd "${{ env.DEPLOY_PATH }}"
            test -f docker-compose.yml || (echo 'docker-compose.yml not found in DEPLOY_PATH' && exit 1)
            test -f .env || (echo '.env not found in DEPLOY_PATH' && exit 1)

            export REGISTRY="${{ env.TCR_REGISTRY }}"
            export API_IMAGE="${{ steps.meta.outputs.api_image }}"
            export IMAGE_TAG="${{ steps.meta.outputs.sha_short }}"

            echo "${{ env.TCR_PASSWORD }}" | docker login "${{ env.TCR_REGISTRY }}" \
              --username "${{ env.TCR_USERNAME }}" --password-stdin

            docker compose --env-file .env -f docker-compose.yml pull
            docker compose --env-file .env -f docker-compose.yml up -d --remove-orphans

      - name: Skip notice
        if: steps.changes.outputs.api != 'true' && steps.changes.outputs.admin != 'true'
        run: echo "No changes in kinit-api or kinit-admin, skip build and deploy."
